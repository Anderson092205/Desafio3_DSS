<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redactar - Gmail Style</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="compose-container">
        <div class="compose-header">
            <span>Mensaje nuevo</span>
        </div>
        <form action="enviar.php" method="POST" enctype="multipart/form-data">
            <div class="compose-body">
                <div class="input-group">
                    <label for="to">Para</label>
                    <input type="email" id="to" name="to" required>
                </div>
                <div class="input-group">
                    <label for="to_multiple">CC (Para varios)</label>
                    <input type="text" id="to_multiple" name="to_multiple" placeholder="Ej: correo1@ejemplo.com, correo2@ejemplo.com">
                </div>
                <div class="input-group">
                    <input type="text" id="subject" name="subject" placeholder="Asunto" required>
                </div>
                <div class="textarea-group">
                    <textarea id="message" name="message" required></textarea>
                </div>
            </div>
            <div class="compose-footer">
                <button type="submit" class="btn-send">Enviar</button>
                <div class="attachment-wrapper">
                    <div class="attachment-icon">
                        <svg focusable="false" viewBox="0 0 24 24" aria-hidden="true"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5a2.5 2.5 0 0 1 5 0v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-3.31-2.69-6-6-6S3 1.69 3 5v12.5c0 3.31 2.69 6 6 6s6-2.69 6-6V6h-1.5z"></path></svg>
                    </div>
                    <input type="file" name="anexo" id="anexo" onchange="document.getElementById('fileName').textContent = this.files[0] ? this.files[0].name : '';">
                </div>
                <span id="fileName" class="file-name-display"></span>
                <input type="hidden" name="okForm" value="Continuar">
            </div>
        </form>
    </div>

</body>
</html>
