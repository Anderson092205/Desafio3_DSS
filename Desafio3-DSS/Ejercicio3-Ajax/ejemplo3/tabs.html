<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <title>Ventana con pestañas usando AJAX</title>
    <script type="text/javascript" src="js/ahahLib.js"></script> 
    <script type="text/javascript" src="js/activetab.js"></script>
    <link rel="stylesheet" type="text/css" href="css/tabs.css?v=2" />
</head>
<body onload="makeactive(1)">

    <!-- Menú de pestañas -->
    <ul id="tabmenu">
        <li onclick="makeactive(1)"><a id="tab1">Noticias</a></li>
        <li onclick="makeactive(2)"><a id="tab2">Sociales</a></li>
        <li onclick="makeactive(3)"><a id="tab3">Deportes</a></li>
        <li onclick="makeactive('e1')"><a id="tabe1">Información personal</a></li>
        <li onclick="makeactive('e2')"><a id="tabe2">Paises de Centroamerica</a></li>
        <li onclick="makeactive('e4')"><a id="tabe4">Registro de Empleados</a></li>
    </ul>

    <!-- Área de contenido -->
    <div id="content">
        (Aquí se mostrará el contenido de cada pestaña)
    </div>

</body>
</html>
